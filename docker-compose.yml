version: "3.9"

services:
  db:
    image: postgres:15
    container_name: todolist-db
    env_file:
      - .env
    volumes:
      - todolist-data:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todolist-app
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8080:8080"
    restart: always

volumes:
  todolist-data: